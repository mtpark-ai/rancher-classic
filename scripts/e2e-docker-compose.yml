# Minimal e2e topology used by .github/workflows/e2e.yml.
#
# Phase 8 deliverable. Brings up:
#   - mariadb 10.11          (external DB for Cattle)
#   - cattle 1.7.0           (rancher-classic server)
#   - 3 × DinD agent hosts   (each running its own dockerd + rancher-classic-agent)
#
# Once all 5 containers are healthy, scripts/e2e-deploy-nginx.sh uses
# rancher-classic-compose to push a 3-replica nginx stack and verify
# cross-host VXLAN connectivity through the HAProxy LB.

services:
  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: cattle
      MARIADB_DATABASE: cattle
      MARIADB_USER: cattle
      MARIADB_PASSWORD: cattle
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [cattle-net]

  cattle:
    image: ghcr.io/mtpark-ai/rancher-classic/cattle:${TAG:-e2e}
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      CATTLE_DB_CATTLE_MYSQL_HOST: mariadb
      CATTLE_DB_CATTLE_MYSQL_PORT: 3306
      CATTLE_DB_CATTLE_MYSQL_NAME: cattle
      CATTLE_DB_CATTLE_USERNAME: cattle
      CATTLE_DB_CATTLE_PASSWORD: cattle
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8080/v2-beta/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 60s
    networks: [cattle-net]

  agent-1: &agent
    image: docker:${DOCKER_VERSION:-27}-dind
    privileged: true
    environment:
      AGENT_NAME: agent-1
      CATTLE_URL: http://cattle:8080/v1
    volumes:
      - ./e2e-agent-bootstrap.sh:/usr/local/bin/bootstrap.sh:ro
    command: ["/usr/local/bin/bootstrap.sh"]
    depends_on:
      cattle:
        condition: service_healthy
    networks: [cattle-net]

  agent-2:
    <<: *agent
    environment:
      AGENT_NAME: agent-2
      CATTLE_URL: http://cattle:8080/v1

  agent-3:
    <<: *agent
    environment:
      AGENT_NAME: agent-3
      CATTLE_URL: http://cattle:8080/v1

networks:
  cattle-net:
    driver: bridge
