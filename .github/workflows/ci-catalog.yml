name: catalog

on:
  push:
    paths: ["components/catalog/**", ".github/workflows/ci-catalog.yml"]
    branches: [main]
  pull_request:
    paths: ["components/catalog/**"]

jobs:
  lint:
    name: lint catalog YAML
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: install yamllint
        run: pipx install yamllint
      - name: lint
        run: yamllint -c .yamllint components/catalog/ || true
