name: ui

# Phase 7 blocked — see components/ui/README.md
#
# components/ui/ has not been seeded yet (the upstream rancher/ui default
# branch is Rancher 2 UI work; the correct 1.6.x baseline ref is a Phase-1
# follow-up). Until then, running `npm ci + ember build` is meaningless.
#
# When Phase 7 is ready, replace the `notice` job below with the real
# Ember build steps.

on:
  push:
    paths: ["components/ui/**"]
    branches: [main]
  pull_request:
    paths: ["components/ui/**"]

jobs:
  notice:
    name: Phase-7 blocked (no build attempted)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "::notice::ui is Phase-7 blocked. See components/ui/README.md"
          test -f components/ui/README.md
