name: e2e

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * *"   # nightly 06:00 UTC

jobs:
  smoke:
    name: 1 server + 3 agents on Ubuntu 24.04 / Docker ${{ matrix.docker }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        docker: ["25", "27"]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build all images locally
        run: scripts/build --all --tag e2e-${{ github.sha }}
      - name: bring up e2e cluster (4 docker-in-docker hosts)
        run: scripts/e2e-up.sh e2e-${{ github.sha }} ${{ matrix.docker }}
      - name: deploy nginx demo stack via Cattle API
        run: scripts/e2e-deploy-nginx.sh
      - name: assert curl through LB
        run: scripts/e2e-assert-lb.sh
      - name: tear down
        if: always()
        run: scripts/e2e-down.sh
