name: host-api

# Phase 4 blocked — see components/host-api/PHASE-4-BLOCKED.md
#
# Calling _reusable-go-ci.yml would attempt `go mod tidy + build` and
# fail because of JWT API + Docker SDK v27 migration debt. Emit a
# notice instead until Phase 4.
#
# When Phase 4 is ready, replace the `notice` job below with:
#
#   ci:
#     uses: ./.github/workflows/_reusable-go-ci.yml
#     with:
#       component: host-api
#       image-name: rancher-classic/host-api

on:
  push:
    paths: ["components/host-api/**", ".github/workflows/_reusable-go-ci.yml"]
    branches: [main]
  pull_request:
    paths: ["components/host-api/**"]

jobs:
  notice:
    name: Phase-4 blocked (no build attempted)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "::notice::host-api is Phase-4 blocked. See components/host-api/PHASE-4-BLOCKED.md"
          test -f components/host-api/PHASE-4-BLOCKED.md
