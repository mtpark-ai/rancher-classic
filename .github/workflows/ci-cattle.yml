name: cattle

# Phase 3 blocked — see components/cattle/PHASE-3-NOTES.md
#
# The baseline ships Maven Wrapper 3.3.9 / Java-8 source. Until Phase 3
# upgrades:
#   1. mvnw + .mvn/wrapper/  → 3.9.x (works under modern JDK)
#   2. maven-compiler-plugin source/target  → 17
#   3. Spring / Jetty / JOOQ / docker-java upgrades documented in
#      PHASE-3-NOTES.md
# we deliberately do NOT call _reusable-java-ci.yml here — it would
# attempt `./mvnw verify` and fail at wrapper bootstrap.
#
# When Phase 3 is ready, replace the `notice` job below with:
#
#   ci:
#     uses: ./.github/workflows/_reusable-java-ci.yml
#     with:
#       java-version: "17"
#       image-name: rancher-classic/cattle

on:
  push:
    paths: ["components/cattle/**", ".github/workflows/_reusable-java-ci.yml"]
    branches: [main]
  pull_request:
    paths: ["components/cattle/**"]

jobs:
  notice:
    name: Phase-3 blocked (no build attempted)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "::notice::cattle is Phase-3 blocked. See components/cattle/PHASE-3-NOTES.md"
          test -f components/cattle/PHASE-3-NOTES.md
