name: cattle

# Phase 3 starter: Maven Wrapper 3.3.2 + Maven 3.9.9 now bootstraps
# under Java 17. Full mvn verify is still blocked on Java 8 → 17 source
# migration, Spring 4 → 6, Jetty 9 → 12, JOOQ 3.3 → 3.19, docker-java
# 1.1.0 → 3.4.0, and K8s/Mesos/Swarm module removal. See
# components/cattle/PHASE-3-NOTES.md.
#
# This workflow validates the bootstrap (mvnw --version) only — the
# heavier verify will be re-enabled as Phase 3 lands.

on:
  push:
    paths: ["components/cattle/**", ".github/workflows/ci-cattle.yml", ".github/workflows/_reusable-java-ci.yml"]
    branches: [main]
  pull_request:
    paths: ["components/cattle/**"]

jobs:
  bootstrap:
    name: Maven Wrapper bootstrap (Java 17)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: ./mvnw --version
        working-directory: components/cattle
        run: ./mvnw --version
      - name: ./mvnw help:effective-pom (parent module only)
        working-directory: components/cattle
        run: ./mvnw -B -ntp -pl . -N help:effective-pom -q >/dev/null
  notice:
    name: Phase-3 blocked (full build)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "::notice::cattle full mvn verify is Phase-3 blocked. See components/cattle/PHASE-3-NOTES.md"
          test -f components/cattle/PHASE-3-NOTES.md
