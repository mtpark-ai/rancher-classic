name: cattle

# Phase 3 blocked — see components/cattle/PHASE-3-NOTES.md
#
# The baseline ships Maven Wrapper 3.3.9 / Java-8 source, so the workflow
# below will fail to run under Java 17 until Phase 3 upgrades:
#   1. mvnw + .mvn/wrapper/  → 3.9.x (works under modern JDK)
#   2. maven-compiler-plugin source/target  → 17
#   3. Spring / Jetty / JOOQ / docker-java upgrades documented in
#      PHASE-3-NOTES.md
#
# Marking the workflow advisory (continue-on-error on the status job)
# until then so the Phase 2 milestone is not gated on Phase 3 work.

on:
  push:
    paths: ["components/cattle/**", ".github/workflows/_reusable-java-ci.yml"]
    branches: [main]
  pull_request:
    paths: ["components/cattle/**"]

jobs:
  ci:
    uses: ./.github/workflows/_reusable-java-ci.yml
    with:
      java-version: "17"
      image-name: rancher-classic/cattle
  status:
    name: Phase-3 blocked (advisory only)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - run: |
          echo "cattle is Phase-3 blocked. See components/cattle/PHASE-3-NOTES.md"
          echo "The reusable Java CI will fail until Phase 3 upgrades Maven Wrapper + Java target + dependency stack."
