name: agent

# Phase 4 blocked — see components/agent/PHASE-4-BLOCKED.md
#
# Calling _reusable-go-ci.yml would attempt `go mod tidy + build` and
# fail because the agent's 40+ docker/docker call sites have not been
# migrated to the v27 SDK API. Emit a notice instead until Phase 4.
#
# When Phase 4 is ready, replace the `notice` job below with:
#
#   ci:
#     uses: ./.github/workflows/_reusable-go-ci.yml
#     with:
#       component: agent
#       image-name: rancher-classic/agent

on:
  push:
    paths: ["components/agent/**", ".github/workflows/ci-agent.yml", ".github/workflows/_reusable-go-ci.yml"]
    branches: [main]
  pull_request:
    paths: ["components/agent/**"]

jobs:
  notice:
    name: Phase-4 blocked (no build attempted)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "::notice::agent is Phase-4 blocked. See components/agent/PHASE-4-BLOCKED.md"
          test -f components/agent/PHASE-4-BLOCKED.md
