version: '2'
services:
  healthcheck:
    labels:
      io.rancher.container.create_agent: 'true'
      io.rancher.scheduler.global: 'true'
    image: ghcr.io/mtpark-ai/rancher-classic/healthcheck:1.7.0
    command: healthcheck --metadata-address 169.254.169.250
    logging:
      driver: json-file
      options:
        max-size: 25m
        max-file: '2'
